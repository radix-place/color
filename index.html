<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Color RGB</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #f2f2f2;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    main {
      width: min(720px, 94vw);
      background: #111;
      border: 1px solid #333;
      border-radius: 24px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    p {
      color: #aaa;
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .formula {
      margin: 18px 0;
      padding: 14px 16px;
      border-radius: 14px;
      background: #050505;
      border: 1px solid #333;
      color: #ddd;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 22px 0;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 800;
      color: #ccc;
      font-size: 1.1rem;
    }

    input {
      background: #050505;
      border: 1px solid #444;
      border-radius: 14px;
      color: #fff;
      padding: 14px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .color-box {
      height: 230px;
      border-radius: 20px;
      border: 1px solid #333;
      background: #800080;
      margin-top: 24px;
    }

    .info {
      margin-top: 16px;
      color: #aaa;
      font-size: 1rem;
      line-height: 1.5;
    }

    .error {
      margin-top: 14px;
      color: #ff8a8a;
      font-weight: 900;
      min-height: 24px;
    }

    @media (max-width: 620px) {
      .inputs {
        grid-template-columns: 1fr;
      }

      .color-box {
        height: 170px;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>RGB</h1>

    <p>
      Escribe los valores de rojo, verde y azul. Cada componente debe ser
      un número entero entre 0 y 255.
    </p>

    <div class="formula">
      Color RGB = [R, G, B]
    </div>

    <div class="inputs">
      <label>
        R
        <input id="r" type="number" value="128" min="0" max="255" step="1" oninput="updateColor()">
      </label>

      <label>
        G
        <input id="g" type="number" value="0" min="0" max="255" step="1" oninput="updateColor()">
      </label>

      <label>
        B
        <input id="b" type="number" value="128" min="0" max="255" step="1" oninput="updateColor()">
      </label>
    </div>

    <div id="colorBox" class="color-box"></div>

    <div id="info" class="info"></div>
    <div id="error" class="error"></div>
  </main>

  <script>
    function updateColor() {
      const r = Number(document.getElementById("r").value);
      const g = Number(document.getElementById("g").value);
      const b = Number(document.getElementById("b").value);

      const error = document.getElementById("error");
      const info = document.getElementById("info");
      const colorBox = document.getElementById("colorBox");

      error.textContent = "";
      info.textContent = "";
      colorBox.textContent = "";

      if (!isValidRgb(r) || !isValidRgb(g) || !isValidRgb(b)) {
        colorBox.style.background = "#222";
        error.textContent = "R, G y B deben ser enteros entre 0 y 255.";
        return;
      }

      const hex = rgbToHex(r, g, b);

      colorBox.style.background = hex;

      info.innerHTML =
        "RGB = [" + r + ", " + g + ", " + b + "]<br>" +
        "HEX = " + hex;
    }

    function isValidRgb(value) {
      return Number.isInteger(value) && value >= 0 && value <= 255;
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map(function(v) {
        return v.toString(16).padStart(2, "0").toUpperCase();
      }).join("");
    }

    updateColor();
  </script>
</body>
</html>
